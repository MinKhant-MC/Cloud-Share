<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://drive.google.com https://lh3.googleusercontent.com https://*.googleusercontent.com https://script.google.com https://script.googleusercontent.com; connect-src 'self' https://script.google.com https://script.googleusercontent.com; media-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
  <title>အကောင့်ဝင်ရန်</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page" data-page="login">
  <main class="auth-shell">
    <section class="auth-panel auth-panel-login" aria-labelledby="loginTitle">
      <div class="auth-brand">
        <div class="auth-logo-wrap">
          <img class="auth-logo" src="assets/logo.png" alt="Cloud Share Logo">
        </div>
        <p class="auth-kicker">Cloud Share</p>
        <h1 id="loginTitle">အကောင့်ဝင်ရန်</h1>
        <p id="loginShopName">Cloud Share</p>
        <span class="auth-tagline">Smart Inventory, Sales, and POS</span>
      </div>

      <form id="loginForm" class="form-stack" autocomplete="on">
        <div class="field">
          <label for="username">အသုံးပြုသူအမည်</label>
          <input id="username" name="username" type="text" autocomplete="username" required>
        </div>

        <div class="field">
          <label for="password">စကားဝှက်</label>
          <div class="password-field">
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button id="togglePasswordButton" class="password-toggle" type="button" aria-label="စကားဝှက် ပြရန်" aria-pressed="false">
              <svg class="icon-eye" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="icon-eye-off" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 3l18 18"></path>
                <path d="M10.6 5.2A10.6 10.6 0 0 1 12 5c6 0 9.5 7 9.5 7a16.2 16.2 0 0 1-3.1 4.1"></path>
                <path d="M6.3 6.8A16.5 16.5 0 0 0 2.5 12s3.5 7 9.5 7a10.5 10.5 0 0 0 4.1-.8"></path>
                <path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"></path>
              </svg>
            </button>
          </div>
        </div>

        <p id="loginMessage" class="form-message" aria-live="polite"></p>

        <button id="loginButton" class="primary-button" type="submit">အကောင့်ဝင်ရန်</button>
        <div class="auth-actions">
          <a id="chatBotButton" class="ghost-button" href="https://t.me/Cloudshareweb_bot" data-telegram-domain="Cloudshareweb_bot" rel="noopener noreferrer">Customer Service Bot</a>
        </div>
      </form>
    </section>
  </main>

  <noscript>JavaScript ဖွင့်ထားရန် လိုအပ်ပါသည်။</noscript>
  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script src="i18n.js"></script>
  <script src="telegram.js"></script>
</body>
</html>
