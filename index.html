<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>အကောင့်ဝင်ရန်</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page" data-page="login">
  <main class="auth-shell">
    <section class="auth-panel" aria-labelledby="loginTitle">
      <div class="auth-brand">
        <h1 id="loginTitle">အကောင့်ဝင်ရန်</h1>
        <p id="loginShopName">ကုန်ပစ္စည်းနှင့် ရောင်းချမှု</p>
      </div>

      <form id="loginForm" class="form-stack" autocomplete="on">
        <div class="field">
          <label for="username">အသုံးပြုသူအမည်</label>
          <input id="username" name="username" type="text" autocomplete="username" required>
        </div>

        <div class="field">
          <label for="password">စကားဝှက်</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>

        <p id="loginMessage" class="form-message" aria-live="polite"></p>

        <button id="loginButton" class="primary-button" type="submit">အကောင့်ဝင်ရန်</button>
      </form>
    </section>
  </main>

  <noscript>JavaScript ဖွင့်ထားရန် လိုအပ်ပါသည်။</noscript>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
