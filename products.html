<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://drive.google.com https://lh3.googleusercontent.com https://*.googleusercontent.com https://script.google.com https://script.googleusercontent.com; connect-src 'self' https://script.google.com https://script.googleusercontent.com; media-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
  <title>ကုန်ပစ္စည်းများ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="app-page" data-page="products">
  <div class="app-shell">
    <aside class="sidebar" aria-label="မီနူး">
      <a class="brand" href="dashboard.html">
        <span id="shopName">ဆိုင်အမည်</span>
      </a>

      <nav class="nav-list" aria-label="အဓိကမီနူး">
        <a class="nav-link" href="dashboard.html">Dashboard</a>
        <a class="nav-link is-active" href="products.html">ကုန်ပစ္စည်းများ</a>
        <a class="nav-link" href="sales.html">ရောင်းချမှုများ</a>
        <a class="nav-link" href="customers.html">ဖောက်သည်များ</a>
        <a class="nav-link" href="reports.html">အစီရင်ခံစာများ</a>
        <a class="nav-link" href="settings.html">ဆက်တင်များ</a>
      </nav>

      <button id="logoutButton" class="ghost-button" type="button">ထွက်ရန်</button>
    </aside>

    <main class="content">
      <header class="page-header">
        <div>
          <h1>ကုန်ပစ္စည်းများ</h1>
          <p id="productsCount">0 ခု</p>
        </div>
        <button id="openProductFormButton" class="primary-button" type="button">ကုန်ပစ္စည်းထည့်ရန်</button>
      </header>

      <section class="toolbar" aria-label="ကုန်ပစ္စည်းရှာရန်">
        <div class="field search-field">
          <label for="productSearch">ရှာရန်</label>
          <input id="productSearch" name="productSearch" type="search" autocomplete="off" placeholder="ကုန်ပစ္စည်း ID သို့မဟုတ် အမည်">
        </div>
      </section>

      <section class="panel">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ပုံ</th>
                <th>ကုန်ပစ္စည်း ID</th>
                <th>Barcode</th>
                <th>ကုန်ပစ္စည်းအမည်</th>
                <th>အမျိုးအစား</th>
                <th>အရောင်</th>
                <th>အရွယ်အစား</th>
                <th>သက်တမ်းကုန်ရက်</th>
                <th>အရေအတွက်</th>
                <th>ဝယ်ဈေး</th>
                <th>ရောင်းဈေး</th>
                <th>လက်ကျန်နည်းနေပါသည်</th>
                <th>လုပ်ဆောင်ချက်</th>
              </tr>
            </thead>
            <tbody id="productsTable">
              <tr>
                <td colspan="13">ဒေတာမရှိပါ</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <dialog id="productDialog" class="modal">
    <form id="productForm" class="form-stack" method="dialog">
      <header class="modal-header">
        <h2 id="productFormTitle">ကုန်ပစ္စည်းထည့်ရန်</h2>
        <button class="icon-button" type="button" data-close-dialog aria-label="ပိတ်ရန်">×</button>
      </header>

      <div class="form-grid">
        <div class="field">
          <label for="productId">ကုန်ပစ္စည်း ID</label>
          <input id="productId" name="product_id" type="text" autocomplete="off" placeholder="P00001">
        </div>
        <div class="field">
          <label for="productBarcode">Barcode</label>
          <div class="scanner-row">
            <input id="productBarcode" name="barcode" type="text" autocomplete="off" placeholder="Scanner ဖြင့်ဖတ်နိုင်သည်">
            <button id="startProductBarcodeScanButton" class="ghost-button" type="button">Scan</button>
            <button id="stopProductBarcodeScanButton" class="ghost-button" type="button" hidden>Stop</button>
          </div>
          <video id="productBarcodeScannerVideo" class="barcode-video" playsinline muted hidden></video>
        </div>
        <div class="field">
          <label for="productName">ကုန်ပစ္စည်းအမည်</label>
          <input id="productName" name="product_name" type="text" required>
        </div>
        <div class="field">
          <label for="productImageFile">ပုံ</label>
          <input id="productImageFile" name="image_file" type="file" accept="image/*">
        </div>
        <div class="field">
          <label for="productCategory">အမျိုးအစား</label>
          <input id="productCategory" name="category" type="text">
        </div>
        <div class="field">
          <label for="productExpiryDate">သက်တမ်းကုန်ရက်</label>
          <input id="productExpiryDate" name="expiry_date" type="date">
        </div>
        <div class="field option-builder">
          <label for="productColorNew">အရောင်</label>
          <input id="productColor" name="color" type="hidden">
          <div class="option-add-row">
            <input id="productColorNew" type="text" autocomplete="off" placeholder="အရောင်ထည့်ရန်">
            <button id="addColorOptionButton" class="ghost-button" type="button">ထည့်ရန်</button>
          </div>
          <div id="productColorOptions" class="option-check-list" aria-label="အရောင်များ"></div>
        </div>
        <div class="field option-builder">
          <label for="productSizeNew">အရွယ်အစား</label>
          <input id="productSize" name="size" type="hidden">
          <div class="option-add-row">
            <input id="productSizeNew" type="text" autocomplete="off" placeholder="အရွယ်အစားထည့်ရန်">
            <button id="addSizeOptionButton" class="ghost-button" type="button">ထည့်ရန်</button>
          </div>
          <div id="productSizeOptions" class="option-check-list" aria-label="အရွယ်အစားများ"></div>
        </div>
        <div class="field">
          <label for="productQuantity">အရေအတွက်</label>
          <input id="productQuantity" name="quantity" type="number" min="0" step="1" required>
        </div>
        <div class="field">
          <label for="buyPrice">ဝယ်ဈေး</label>
          <input id="buyPrice" name="buy_price" type="number" min="0" step="0.01" required>
        </div>
        <div class="field">
          <label for="sellPrice">ရောင်းဈေး</label>
          <input id="sellPrice" name="sell_price" type="number" min="0" step="0.01" required>
        </div>
        <div class="field">
          <label for="lowStockAlert">လက်ကျန်နည်းနေပါသည်</label>
          <input id="lowStockAlert" name="low_stock_alert" type="number" min="0" step="1" value="0">
        </div>
      </div>

      <p id="productMessage" class="form-message" aria-live="polite"></p>

      <footer class="modal-actions">
        <button class="ghost-button" type="button" data-close-dialog>ပယ်ဖျက်ရန်</button>
        <button class="primary-button" type="submit">သိမ်းရန်</button>
      </footer>
    </form>
  </dialog>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="local-sync.js"></script>
  <script src="auth.js"></script>
  <script src="i18n.js"></script>
  <script src="vendor/zxing-browser.min.js"></script>
  <script src="table-view.js"></script>
  <script src="products.js"></script>
  <script src="floating-assistant.js"></script>
</body>
</html>
