<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://drive.google.com https://lh3.googleusercontent.com https://*.googleusercontent.com https://script.google.com https://script.googleusercontent.com; connect-src 'self' https://script.google.com https://script.googleusercontent.com; media-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
  <title>ဆက်တင်များ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="app-page" data-page="settings">
  <div class="app-shell">
    <aside class="sidebar" aria-label="မီနူး">
      <a class="brand" href="dashboard.html">
        <span id="shopName">ဆိုင်အမည်</span>
      </a>

      <nav class="nav-list" aria-label="အဓိကမီနူး">
        <a class="nav-link" href="dashboard.html">Dashboard</a>
        <a class="nav-link" href="products.html">ကုန်ပစ္စည်းများ</a>
        <a class="nav-link" href="sales.html">ရောင်းချမှုများ</a>
        <a class="nav-link" href="customers.html">ဖောက်သည်များ</a>
        <a class="nav-link" href="reports.html">အစီရင်ခံစာများ</a>
        <a class="nav-link is-active" href="settings.html">ဆက်တင်များ</a>
      </nav>

      <button id="logoutButton" class="ghost-button" type="button">ထွက်ရန်</button>
    </aside>

    <main class="content">
      <header class="page-header">
        <div>
          <h1>ဆက်တင်များ</h1>
          <p id="settingsStatus">ဆိုင်အချက်အလက်</p>
        </div>
      </header>

      <section class="panel settings-panel">
        <form id="settingsForm" class="form-stack">
          <div class="form-grid">
            <div class="field">
              <label for="settingsShopName">ဆိုင်အမည်</label>
              <input id="settingsShopName" name="shop_name" type="text" required>
            </div>
            <div class="field">
              <label for="settingsCurrency">ငွေကြေး</label>
              <input id="settingsCurrency" name="currency" type="text" value="MMK" required>
            </div>
            <div class="field">
              <label for="settingsThemeColor">အဓိကအရောင်</label>
              <input id="settingsThemeColor" name="theme_color" type="color" value="#2563eb">
            </div>
            <div class="field">
              <label for="settingsAccentColor">ဒုတိယအရောင်</label>
              <input id="settingsAccentColor" name="accent_color" type="color" value="#0f766e">
            </div>
            <div class="field">
              <label for="settingsBackgroundColor">နောက်ခံအရောင်</label>
              <input id="settingsBackgroundColor" name="background_color" type="color" value="#f6f7f9">
            </div>
            <div class="field field-span-2">
              <label for="settingsBackgroundImage">Background Image</label>
              <input id="settingsBackgroundImage" name="background_image" type="file" accept="image/*">
              <small id="settingsBackgroundImageName" class="field-help"></small>
            </div>
          </div>

          <p id="settingsMessage" class="form-message" aria-live="polite"></p>

          <button class="primary-button" type="submit">သိမ်းရန်</button>
        </form>
      </section>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script src="i18n.js"></script>
  <script src="main.js"></script>
  <script src="floating-assistant.js"></script>
</body>
</html>
